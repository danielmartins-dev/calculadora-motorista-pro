<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Lucro Real do Motorista</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

button{
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.primary{
background:#2563eb;
color:white;
}

.green{
background:#16a34a;
color:white;
}

.result{
background:white;
color:black;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.share{
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>Calculadora de Lucro Real do Motorista</h1>
<p>por @danielnovolante</p>

<h3>Custos do carro</h3>

<input id="fuelPrice" placeholder="Preço do combustível (ex: 6.19)">
<input id="kmPerLiter" placeholder="Consumo km/l (ex: 11)">
<input id="monthlyKm" placeholder="Km rodados por mês">
<input id="insurance" placeholder="Seguro anual">
<input id="ipva" placeholder="IPVA anual">
<input id="maintenance" placeholder="Manutenção mensal">
<input id="carValue" placeholder="Valor do carro">

<button class="primary" onclick="calcularCusto()">Calcular custo por km</button>

<h3 style="margin-top:40px">Resultado do dia</h3>

<input id="gross" placeholder="Ganho bruto do dia">
<input id="kmDay" placeholder="Km rodados no dia">
<input id="hours" placeholder="Horas trabalhadas">
<input id="extra" placeholder="Gastos extras">

<button class="primary" onclick="calcularLucro()">Calcular resultado</button>

<div id="resultado" class="result" style="display:none">

<h2>Resultado do dia</h2>

<p>Lucro líquido: <b id="lucro"></b></p>
<p>Lucro por hora: <b id="hora"></b></p>
<p>Lucro por km: <b id="km"></b></p>
<p>Classificação: <b id="classificacao"></b></p>

<div class="share">

<button class="green" onclick="compartilhar()">Compartilhar meu resultado</button>

<button onclick="whatsapp()">Enviar no WhatsApp</button>

</div>

</div>

</div>

<script>

let custoKm = 0
let ultimoResultado = {}

const SITE = "https://danielmartins-dev.github.io/calculadora-motorista-pro/"

function moeda(v){
return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})
}

function calcularCusto(){

let fuel = Number(fuelPrice.value)
let consumo = Number(kmPerLiter.value)
let kmMes = Number(monthlyKm.value)

let seguro = Number(insurance.value)
let ipvaV = Number(ipva.value)
let manut = Number(maintenance.value)
let carro = Number(carValue.value)

let kmAno = kmMes * 12

let combustivel = fuel/consumo
let seguroKm = seguro/kmAno
let ipvaKm = ipvaV/kmAno
let manutKm = manut/kmMes
let depreciacao = (carro*0.20)/kmAno

custoKm = combustivel + seguroKm + ipvaKm + manutKm + depreciacao

alert("Custo por km: "+moeda(custoKm))

}

function classificar(lucroHora){

if(lucroHora<20) return "Fraco"
if(lucroHora<30) return "Razoável"
if(lucroHora<40) return "Bom"
return "Excelente"

}

function calcularLucro(){

let bruto = Number(gross.value)
let kmRodado = Number(kmDay.value)
let horas = Number(hours.value)
let extra = Number(extra.value)

let custoDia = kmRodado*custoKm
let total = custoDia + extra
let lucro = bruto-total

let porHora = lucro/horas
let porKm = lucro/kmRodado

let classe = classificar(porHora)

lucroEl = document.getElementById("lucro")
horaEl = document.getElementById("hora")
kmEl = document.getElementById("km")
classEl = document.getElementById("classificacao")

lucroEl.innerText = moeda(lucro)
horaEl.innerText = moeda(porHora)
kmEl.innerText = moeda(porKm)
classEl.innerText = classe

resultado.style.display="block"

ultimoResultado = {
lucro,
porHora,
porKm,
classe
}

}

function textoCompartilhar(){

return `Hoje descobri que sobraram só ${moeda(ultimoResultado.lucro)} no meu bolso rodando de app.

Lucro por hora: ${moeda(ultimoResultado.porHora)}
Lucro por km: ${moeda(ultimoResultado.porKm)}
Classificação do dia: ${ultimoResultado.classe}

Calculei aqui:
${SITE}`

}

function compartilhar(){

let texto = textoCompartilhar()

if(navigator.share){

navigator.share({
title:"Resultado motorista de app",
text:texto,
url:SITE
})

}else{

navigator.clipboard.writeText(texto)
alert("Texto copiado para compartilhar!")

}

}

function whatsapp(){

let texto = encodeURIComponent(textoCompartilhar())

window.open(`https://wa.me/?text=${texto}`)

}

</script>

</body>
</html>
